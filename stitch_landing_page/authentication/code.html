<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DOCNEX - Secure Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f1729",
                        "background-light": "#f6f7f8",
                        "background-dark": "#14171e",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(15, 23, 41, 0.1);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display">
<!-- Top Navigation -->
<header class="w-full px-6 py-4 flex items-center justify-between bg-transparent fixed top-0 z-50">
<div class="flex items-center gap-2 text-primary dark:text-slate-100">
<div class="size-8 flex items-center justify-center bg-primary text-white rounded-lg">
<span class="material-symbols-outlined text-xl">database</span>
</div>
<h2 class="text-xl font-bold tracking-tight">DOCNEX</h2>
</div>
<div class="flex items-center gap-4">
<button class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-white transition-colors">
                Support
            </button>
<button class="bg-primary/5 dark:bg-slate-800 text-primary dark:text-slate-100 text-sm font-semibold px-4 py-2 rounded-lg hover:bg-primary/10 transition-all">
                Create Account
            </button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center px-4 py-20 relative overflow-hidden">
<!-- Abstract Background Elements -->
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-3xl -z-10"></div>
<!-- Authentication Card -->
<div class="w-full max-w-[440px] glass-card rounded-xl shadow-2xl p-8 md:p-10">
<div class="text-center mb-10">
<h1 class="text-3xl font-black text-slate-900 dark:text-slate-100 tracking-tight mb-2">Welcome Back</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Access your secure professional document portal</p>
</div>
<form class="space-y-5">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 px-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<input class="block w-full pl-10 pr-4 py-3.5 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" id="email" placeholder="dr.smith@medical.org" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="block w-full pl-10 pr-12 py-3.5 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-lg text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" id="password" placeholder="Enter your security key" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-2 px-1">
<input class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400 select-none" for="remember">Stay signed in for 30 days</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 hover:bg-primary/90 transform active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Secure Sign In</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<div class="mt-8">
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
<span class="flex-shrink mx-4 text-xs font-bold uppercase tracking-widest text-slate-400">Or continue with</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="grid grid-cols-2 gap-4 mt-6">
<button class="flex items-center justify-center gap-2 py-3 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<img alt="" class="w-5 h-5" data-alt="Google colorful brand logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPC23reoDjk20KerodvTsmr-IcPTZyM9f1-0aKpbjGR7oVe87ZgS6ufNYDMh8IG0t_eCZ6LtXmUnahea_N_gGygGPO_2rhY9IbxEEAAnIBA3I8DcLoZ_mfnEWwU7dAUP4TOgSBEYuVGh5ViWgy1_kgqkGhWaHjI4pylfDlwOftGw1Y578WN4MWsdKHL8HZlg-5cBp1elHyGkezVfejh02A2d2IyBuljk7GSQyb_rZKTBSQKZ9MIfyOu0ZhgcI6Rw2igNgmTp2DONw"/>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-xl text-slate-900 dark:text-white">fingerprint</span>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Biometric</span>
</button>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-6 px-10 border-t border-slate-200 dark:border-slate-800 flex flex-col md:flex-row justify-between items-center gap-4 bg-white/50 dark:bg-slate-900/50">
<div class="flex items-center gap-6">
<p class="text-xs font-medium text-slate-500 dark:text-slate-400">© 2024 DOCNEX Inc. All rights reserved.</p>
</div>
<div class="flex items-center gap-6">
<a class="text-xs font-medium text-slate-500 dark:text-slate-400 hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="text-xs font-medium text-slate-500 dark:text-slate-400 hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="text-xs font-medium text-slate-500 dark:text-slate-400 hover:text-primary transition-colors" href="#">Security Status</a>
</div>
<div class="flex items-center gap-2 text-emerald-500">
<span class="material-symbols-outlined text-sm">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">HIPAA Compliant</span>
</div>
</footer>
</body></html>
